name: Build and deploy Code image Generator

on:
  workflow_dispatch:

jobs:
  
  setup_env:
    name: Setup Enviornment
    runs-on: ubuntu-latest

    permissions:
      contents: read
    
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with: 
          fetch-depth: 0

      - name: Intiallise Environment
        uses: ./.github/actions/install-deps
        with:
          python-version: '3.14'
          requirements-path: 'requirements.txt'

      

      
           
          









































































































































  