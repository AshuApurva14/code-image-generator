repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.26.0  # Use the latest stable version
    hooks:
        - id: gitleaks


  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-yaml          # Verifies YAML syntax
      - id: trailing-whitespace # Removes extra spaces at end of lines
      - id: end-of-file-fixer   # Ensures files end with a newline
      - id: check-added-large-files # Prevents huge files from being committed

