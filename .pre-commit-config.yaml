repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.26.0  # Use the latest stable version
    hooks:
        - id: gitleaks


  # Ruff Linter and Formatter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Use the latest stable version tag
    rev: v0.15.17
    hooks:
      # 1. Run the linter and fix safe errors automatically
      - id: ruff-check
        args: [ --fix ]
      # 2. Run the formatter to auto-style code blocks
      - id: ruff-format



  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-yaml          # Verifies YAML syntax
      - id: trailing-whitespace # Removes extra spaces at end of lines
      - id: end-of-file-fixer   # Ensures files end with a newline
      - id: check-added-large-files # Prevents huge files from being committed

  # # Language-specific linter (e.g., Flake8 for Python)
  # - repo: https://github.com/pycqa/flake8
  #   rev: 7.0.0
  #   hooks:
  #     - id: flake8
